{% extends "base.html" %}
{% block title %}Register - Trailmark{% endblock %}
{% block content %}
<section class="auth-panel wide">
  <h1 class="h3 mb-1">Register</h1>
  <p class="text-muted mb-4">Trekkers can log in immediately. Staff need admin approval.</p>
  <form method="post" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Full Name</label>
      <input class="form-control" name="name" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Email</label>
      <input class="form-control" type="email" name="email" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Contact Number</label>
      <input class="form-control" name="phone">
    </div>
    <div class="col-md-6">
      <label class="form-label">Role</label>
      <select class="form-select" name="role" required>
        <option value="">Select role</option>
        <option value="user">User (Trekker)</option>
        <option value="staff">Trek Staff</option>
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" name="password" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Confirm Password</label>
      <input class="form-control" type="password" name="confirm_password" required>
    </div>
    <div class="col-12">
      <button class="btn btn-primary w-100" type="submit">Register</button>
    </div>
  </form>
  <p class="mt-3 mb-0">Already registered? <a href="{{ url_for('login') }}">Login here</a></p>
</section>
{% endblock %}
