{% extends "base.html" %}
{% block title %}{{ "Edit" if trek else "Add" }} Trek{% endblock %}
{% block content %}
<div class="page-head">
  <div>
    <h1>{{ "Edit Trek" if trek else "Add New Trek" }}</h1>
    <p class="text-muted">Fill the trek details and assign approved staff.</p>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('admin_treks') }}">Back</a>
</div>

<section class="form-panel">
  <form method="post" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Trek Name</label>
      <input class="form-control" name="name" value="{{ trek.name if trek else '' }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Location</label>
      <input class="form-control" name="location" value="{{ trek.location if trek else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">Difficulty</label>
      <select class="form-select" name="difficulty">
        {% for item in ["Easy", "Moderate", "Hard"] %}
          <option value="{{ item }}" {% if trek and trek.difficulty == item %}selected{% endif %}>{{ item }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Duration (Days)</label>
      <input class="form-control" type="number" min="1" name="duration_days" value="{{ trek.duration_days if trek else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">Total Slots</label>
      <input class="form-control" type="number" min="1" name="total_slots" value="{{ trek.total_slots if trek else '' }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Start Date</label>
      <input class="form-control" type="date" name="start_date" value="{{ trek.start_date if trek else '' }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">End Date</label>
      <input class="form-control" type="date" name="end_date" value="{{ trek.end_date if trek else '' }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Assign Staff</label>
      <select class="form-select" name="staff_id">
        <option value="">Unassigned</option>
        {% for member in staff %}
          <option value="{{ member.id }}" {% if trek and trek.staff_id == member.id %}selected{% endif %}>{{ member.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Status</label>
      <select class="form-select" name="status">
        {% for item in ["Pending", "Approved", "Open", "Closed", "Started", "Completed"] %}
          <option value="{{ item }}" {% if trek and trek.status == item %}selected{% endif %}>{{ item }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label">Description</label>
      <textarea class="form-control" name="description" rows="4">{{ trek.description if trek else '' }}</textarea>
    </div>
    <div class="col-12 d-flex justify-content-end gap-2">
      <a class="btn btn-outline-secondary" href="{{ url_for('admin_treks') }}">Cancel</a>
      <button class="btn btn-primary" type="submit">Save</button>
    </div>
  </form>
</section>
{% endblock %}
